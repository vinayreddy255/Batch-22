
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Registration</title>
	<style>
		:root{
			--blue: #1264d2;
			--card-bg: #f7f7f9;
			--muted: #6b6b6b;
			--input-bg: #fff;
			--border: #e0e0e0;
		}
		html,body{height:100%;}
		body{
			margin:0;
			font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
			background: linear-gradient(180deg,var(--blue) 0%, #0b63c1 50%);
			display:flex;
			align-items:center;
			justify-content:center;
			padding:40px;
			-webkit-font-smoothing:antialiased;
		}

		.frame{
			width:100%;
			max-width:980px;
			background:var(--card-bg);
			border-radius:6px;
			box-shadow:0 8px 0 rgba(0,0,0,0.06);
			padding:34px;
			box-sizing:border-box;
			border:1px solid rgba(0,0,0,0.04);
		}

		h1{
			margin:0 0 6px 0;
			font-size:20px;
			color:#111;
			font-weight:700;
			letter-spacing:0.2px;
		}
		.subtitle{
			color:var(--muted);
			margin:14px 0 24px 0;
			font-size:13px;
		}

		.grid{
			display:grid;
			grid-template-columns:repeat(3, 1fr);
			gap:18px 28px;
		}

		.section-title{
			grid-column:1/-1;
			margin-top:6px;
			margin-bottom:8px;
			color:var(--muted);
			font-weight:600;
			font-size:14px;
		}

		.field{
			display:flex;
			flex-direction:column;
		}
		label{
			font-size:12px;
			color:#333;
			margin-bottom:8px;
			font-weight:600;
		}
		.hint{
			font-size:12px;
			color:var(--muted);
			margin-bottom:6px;
			font-weight:500;
		}

		input[type="text"], input[type="email"], input[type="date"]{
			padding:12px 14px;
			border-radius:6px;
			border:1px solid var(--border);
			background:var(--input-bg);
			outline:none;
			font-size:13px;
			color:#222;
			box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
		}
		input::placeholder{color:#bdbdbd;}

		/* Make some labels smaller like the screenshot */
		.small-label{font-size:11px; color:var(--muted); font-weight:600;}

		.actions{
			margin-top:22px;
			display:flex;
			align-items:center;
		}

		.btn{
			background:var(--blue);
			color:#fff;
			padding:10px 22px;
			border-radius:6px;
			border:none;
			font-weight:700;
			cursor:pointer;
			box-shadow:0 4px 0 rgba(0,0,0,0.06);
		}

		/* Responsive */
		@media (max-width:980px){
			.grid{grid-template-columns:repeat(2,1fr);} 
		}
		@media (max-width:640px){
			.grid{grid-template-columns:1fr;}
			.frame{padding:20px}
		}

	</style>
</head>
<body>

	<div class="frame" role="region" aria-label="Registration form">
		<h1>Registration</h1>
		<div class="subtitle">Personal Details</div>

		<form>
			<div class="grid">

				<!-- Column/Row 1 -->
				<div class="field">
					<label class="small-label">Full Name</label>
					<input type="text" placeholder="Enter your name" />
				</div>

				<div class="field">
					<label class="small-label">Date of Birth</label>
					<input type="date" placeholder="Enter birth date" />
				</div>

				<div class="field">
					<label class="small-label">Email</label>
					<input type="email" placeholder="Enter your email" />
				</div>

				<div class="field">
					<label class="small-label">Mobile number</label>
					<input type="text" placeholder="Enter mobile number" />
				</div>

				<div class="field">
					<label class="small-label">Gender</label>
					<input type="text" placeholder="Enter your gender" />
				</div>

				<div class="field">
					<label class="small-label">Occupation</label>
					<input type="text" placeholder="Enter occupation" />
				</div>

				<div class="section-title">Identity Details</div>

				<div class="field">
					<label class="small-label">ID Type</label>
					<input type="text" placeholder="Enter ID Type" />
				</div>

				<div class="field">
					<label class="small-label">ID Number</label>
					<input type="text" placeholder="Enter ID number" />
				</div>

				<div class="field">
					<label class="small-label">Issue Authority</label>
					<input type="text" placeholder="Enter issue department" />
				</div>

				<div class="field">
					<label class="small-label">Issue Date</label>
					<input type="date" placeholder="Enter ID issue date" />
				</div>

				<div class="field">
					<label class="small-label">Issue State</label>
					<input type="text" placeholder="Enter ID issue state" />
				</div>

				<div class="field">
					<label class="small-label">Expiry Date</label>
					<input type="date" placeholder="Enter ID expiry date" />
				</div>

			</div>

			<div class="actions">
				<button type="button" class="btn">Next &rarr;</button>
			</div>
		</form>
	</div>

</body>
</html>
