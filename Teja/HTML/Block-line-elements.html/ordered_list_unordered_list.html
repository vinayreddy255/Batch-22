<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- ol is the ordered list and it is used to create a list of items in a specific order.
        The items in an ordered list are typically numbered by default we can change by using the type  as lettered,serial numbers, etc.
        The <ol> tag is used to define an ordered list, and each item in the list is defined using the <li> (list item) tag. 
        The numbering or lettering of the items in an ordered list is automatically generated by the browser
        Ordered lists are commonly used when the order of the items is important, such as in instructions, steps, or rankings.  -->
    <ol>
        <li>Teja</li>
        <li>23</li>
        <li>Working</li>
        <li>Embedded Systems</li>
    </ol>
    <!-- ul is the unordered list and it is used to create a list of items without a specific order.
        The items in an unordered list are typically displayed with bullet points.
        The <ul> tag is used to define an unordered list, and each item in the list is defined using the <li> (list item) tag.
        Unordered lists are commonly used when the order of the items is not important, such as in a list of features or options. -->
    <ul>
        <li>Teja</li>
        <li>23</li>
        <li>Working</li>
        <li>Embedded Systems</li>
    </ul>

    <!-- if you are not mentioning the ol and ul then it will be treated as a normal list and it don't give margin space -->
        <li>Teja</li>
        <li>23</li>
        <li>Working</li>
        <li>Embedded Systems</li>
</body>
</html>
