<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="https://www.google.com/">Google</a>
    <a href="https://www.flipkart.com/">Flipkart</a>

    <hr>

    <a href="https://www.google.com/" target="_blank">Google</a>
    <a href="https://www.flipkart.com/" target="_blank">Flipkart</a>
        <!--
        <a> tag (Anchor Tag)

        - The <a> tag is used to create hyperlinks (links).
        - It allows users to navigate from one page to another page.
        - It is an inline element, so it is displayed side by side with other inline elements.

        Important Attributes:

        1. href
        - Stands for Hypertext Reference.
        - Specifies the destination URL or path.

        2. target
        - Specifies where the linked document will open.
        - _self  : Opens in the same tab (default).
        - _blank : Opens in a new tab.

        3. title
        - Displays a tooltip when the mouse hovers over the link.
        -->
</body>
</html>
