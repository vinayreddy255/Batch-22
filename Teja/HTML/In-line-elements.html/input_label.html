<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name">
        <!--
        <input> tag
        - Used to take input from the user.
        - It is an empty tag.
        - Different types of input can be created using the type attribute.

        <label> tag
        - Used to provide a caption or description for an input field.
        - Improves accessibility and SEO.

        for attribute
        - Used inside the <label> tag.
        - Connects the label with an input field.
        - The value of the for attribute must match the id of the input element.

        type attribute
        - Specifies the type of input field.
        - Examples:
        text      : Text input
        password  : Password input
        email     : Email input
        number    : Number input
        date      : Date picker
        radio     : Radio button
        checkbox  : Checkbox

        id attribute
        - Provides a unique identifier for an element.
        - Used to connect a label with an input field.
        - No two elements should have the same id.

        placeholder attribute
        - Displays a hint or sample text inside the input field.
        - The text disappears when the user starts typing.
        -->
    </body>
</html>
