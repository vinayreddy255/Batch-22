<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <img src="./Images/image.png" alt="Description of image" width="400" height="300" loading="lazy">
    <img src="./Images/image_1.png" alt="Description of image 2" width="400" height="300" loading="lazy">
    <img src="./Images/image_2.png" alt="Description of image 3" width="400" height="300" loading="lazy">
        <!--
            <img> tag is used to display an image on a web page.

            Attributes:

            1. src
            - Stands for Source.
            - Specifies the location (path) of the image.

            2. alt
            - Stands for Alternative Text.
            - Displays text if the image cannot be loaded.
            - Helps screen readers understand the image.

            3. width
            - Specifies the width of the image.

            4. height
            - Specifies the height of the image.

            5. loading
            - Controls how the browser loads images.
            - loading="lazy" → Loads the image only when it comes into view.
            - loading="eager" → Loads the image immediately.
        -->
</body>
</html>
