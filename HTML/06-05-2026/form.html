<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="https://www.google.com" method="post">
      <label for="name">Name*:</label>
      <input type="text" id="name" name="name" required />
      <br />

      <label for="phone">Phone:</label>
      <input type="number" id="phone" name="phone" />
      <br />
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />
      <br />
      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required />
      <br />
      <label for="dob">Date of Birth:</label>
      <input type="date" id="dob" name="dob" />
      <br />
      <label for="month">Month:</label>
      <input type="month" id="month" name="month" />
      <br />
      <label for="week">Week:</label>
      <input type="week" id="week" name="week" />
      <br />
      <label for="time">Time:</label>
      <input type="time" id="time" name="time" />
      <br />
      <label for="datetime-local">Date and Time:</label>
      <input type="datetime-local" id="datetime-local" name="datetime-local" />
      <br />
      <label for="course">Course:</label>
      <input type="checkbox" id="Html" name="Html" />
      <label for="Html">HTML</label>
      <input type="checkbox" id="Css" name="Css" />
      <label for="Css">CSS</label>
      <input type="checkbox" id="Js" name="Js" />
      <label for="Js">JavaScript</label>

      <br />
      <label for="gender">Gender:</label>
      <input type="radio" id="male" name="gender" value="male" />
      <label for="male">Male</label>
      <input type="radio" id="female" name="gender" value="female" />
      <label for="female">Female</label>
      <input type="radio" id="other" name="gender" value="other" />
      <label for="other">Other</label>
      <br />
      <label for="fileSingle">Upload File (PDF or JPG):</label>
      <input
        type="file"
        id="fileSingle"
        name="fileSingle"
        accept=".pdf,.jpg,.jpeg,application/pdf,image/jpeg"
      />
      <br />
      <label for="fileMultiple">Multiple Upload File (PDF or JPG):</label>
      <input
        type="file"
        id="fileMultiple"
        name="fileMultiple"
        multiple
        accept=".pdf,.jpg,.jpeg,application/pdf,image/jpeg"
      />
      <br />
      <textarea id="message" name="message" rows="10" cols="20"> </textarea>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
