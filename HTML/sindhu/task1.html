<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1><center>Registration Form</center></h1>

        <form>

            <h2>Personal Details</h2>

            <div class="form-grid">

                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>

                <div class="input-box">
                    <label>Date of Birth</label>
                    <input type="date">
                </div>

                <div class="input-box">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-box">
                    <label>Mobile Number</label>
                    <input type="tel" placeholder="Enter mobile number">
                </div>

                <div class="input-box">
                    <label>Gender</label>
                    <select>
                        <option>Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="input-box">
                    <label>Occupation</label>
                    <input type="text" placeholder="Enter occupation">
                </div>

            </div>
            <br>

            <h3>Identity Details</h3>
            

            <div class="form-grid">

                <div class="input-box">
                    <label>ID Type</label>
                    <input type="text" placeholder="Enter ID Type">
                </div>

                <div class="input-box">
                    <label>ID Number</label>
                    <input type="text" placeholder="Enter ID Number">
                </div>

                <div class="input-box">
                    <label>Issue Authority</label>
                    <input type="text" placeholder="Enter Issue Authority">
                </div>

                <div class="input-box">
                    <label>Issue Date</label>
                    <input type="date">
                </div>

                <div class="input-box">
                    <label>Issue State</label>
                    <input type="text" placeholder="Enter Issue State">
                </div>

                <div class="input-box">
                    <label>Expiry Date</label>
                    <input type="date">
                </div>

            </div>

            <button type="submit" class="btn">
                Next →
            </button>

        </form>

    </div>

</body>
</html>
